<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #0e0e0c;
    --bg2: #161614;
    --bg3: #1e1e1b;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0ede6;
    --text2: #8a8880;
    --text3: #555450;
    --accent: #d4c9a8;
    --accent2: #b8a87a;
    --serif: 'DM Serif Display', serif;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 10px;
    --radius-lg: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- PANTALLA AUTH ---- */
  #authScreen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
  }

  #authScreen::before {
    content: 'Aa Bb Cc Dd Ee Ff Gg Hh Ii Jj Kk Ll Mm Nn Oo Pp Qq Rr Ss Tt Uu Vv Ww Xx Yy Zz';
    position: absolute;
    inset: 0;
    font-family: var(--serif);
    font-size: 5rem;
    color: rgba(255,255,255,0.018);
    word-break: break-all;
    line-height: 1;
    pointer-events: none;
    overflow: hidden;
    padding: 2rem;
  }

  .auth-box {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2.5rem;
    width: 100%;
    max-width: 400px;
    position: relative;
    z-index: 1;
  }

  .auth-logo {
    font-family: var(--serif);
    font-size: 2rem;
    color: var(--text);
    margin-bottom: 0.3rem;
    letter-spacing: -0.02em;
  }

  .auth-sub {
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
    margin-bottom: 2rem;
    letter-spacing: 0.05em;
  }

  .auth-tabs {
    display: flex;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 1.5rem;
    gap: 0;
  }

  .auth-tab {
    font-size: 13px;
    color: var(--text3);
    padding: 8px 16px 10px;
    cursor: pointer;
    border-bottom: 1.5px solid transparent;
    margin-bottom: -0.5px;
    font-family: var(--sans);
    transition: all 0.15s;
    background: none;
    border-left: none;
    border-right: none;
    border-top: none;
  }

  .auth-tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .field {
    margin-bottom: 1rem;
  }

  .field label {
    display: block;
    font-size: 11px;
    color: var(--text3);
    font-family: var(--mono);
    margin-bottom: 6px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .field input {
    width: 100%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 14px;
    color: var(--text);
    font-family: var(--sans);
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus {
    border-color: var(--accent2);
  }

  .btn-primary {
    width: 100%;
    background: var(--accent);
    color: #0e0e0c;
    border: none;
    border-radius: var(--radius);
    padding: 11px;
    font-size: 14px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    margin-top: 0.5rem;
    transition: opacity 0.15s;
  }

  .btn-primary:hover { opacity: 0.88; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

  .auth-msg {
    font-size: 12px;
    padding: 8px 12px;
    border-radius: var(--radius);
    margin-top: 1rem;
    font-family: var(--mono);
    display: none;
  }

  .auth-msg.error {
    background: rgba(220,80,60,0.12);
    color: #e07060;
    border: 0.5px solid rgba(220,80,60,0.2);
    display: block;
  }

  .auth-msg.success {
    background: rgba(80,180,100,0.1);
    color: #70c080;
    border: 0.5px solid rgba(80,180,100,0.2);
    display: block;
  }

  /* ---- APP PRINCIPAL ---- */
  #appScreen { display: none; }

  .topbar {
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 100;
  }

  .topbar-logo {
    font-family: var(--serif);
    font-size: 1.4rem;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .user-pill {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text2);
    background: var(--bg3);
    border: 0.5px solid var(--border);
    padding: 4px 10px;
    border-radius: 20px;
    max-width: 160px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .btn-logout {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    cursor: pointer;
    font-family: var(--sans);
    transition: all 0.15s;
  }

  .btn-logout:hover { border-color: var(--border2); color: var(--text2); }

  /* ---- SIDEBAR ---- */
  .layout {
    display: flex;
    min-height: calc(100vh - 56px);
  }

  .sidebar {
    width: 220px;
    border-right: 0.5px solid var(--border);
    padding: 1.5rem 1rem;
    flex-shrink: 0;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--text3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 0 0.5rem;
    margin-bottom: 8px;
  }

  .user-item {
    padding: 7px 10px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 8px;
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .user-item:hover { background: var(--bg3); color: var(--text); }
  .user-item.active { background: var(--bg3); color: var(--accent); }

  .user-avatar {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--bg3);
    border: 0.5px solid var(--border2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 500;
    color: var(--accent2);
    flex-shrink: 0;
    font-family: var(--mono);
  }

  /* ---- CONTENIDO PRINCIPAL ---- */
  .main {
    flex: 1;
    padding: 2rem;
    overflow-x: hidden;
  }

  .main-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    gap: 1rem;
  }

  .main-title {
    font-family: var(--serif);
    font-size: 2rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .main-meta {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    margin-top: 4px;
  }

  .btn-upload {
    background: var(--accent);
    color: #0e0e0c;
    border: none;
    border-radius: var(--radius);
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 500;
    font-family: var(--sans);
    cursor: pointer;
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .btn-upload:hover { opacity: 0.85; }

  /* ---- CONTROLES ---- */
  .catalog-controls {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .catalog-controls input[type=text] {
    flex: 1;
    min-width: 180px;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: var(--sans);
    outline: none;
  }

  .catalog-controls input[type=text]:focus { border-color: var(--accent2); }

  .size-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--text3);
    font-family: var(--mono);
  }

  .size-wrap input[type=range] { width: 80px; accent-color: var(--accent2); }

  /* ---- GRID DE FUENTES ---- */
  .fonts-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .font-card {
    background: var(--bg2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem;
    transition: border-color 0.15s;
    position: relative;
    overflow: hidden;
  }

  .font-card:hover { border-color: var(--border2); }

  .font-card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 1rem;
  }

  .font-card-name {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text3);
    max-width: 65%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .card-actions {
    display: flex;
    gap: 6px;
  }

  .btn-card {
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 20px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text3);
    cursor: pointer;
    font-family: var(--sans);
    text-decoration: none;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 3px;
  }

  .btn-card:hover { border-color: var(--accent2); color: var(--accent); }

  .btn-card.danger:hover { border-color: rgba(220,80,60,0.4); color: #e07060; }

  .font-preview-text {
    font-size: 36px;
    line-height: 1.1;
    color: var(--text);
    min-height: 52px;
    word-break: break-word;
    overflow: hidden;
  }

  .font-divider {
    height: 0.5px;
    background: var(--border);
    margin: 12px 0 8px;
  }

  .font-alphabet {
    font-size: 11px;
    color: var(--text3);
    letter-spacing: 0.08em;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
  }

  /* ---- UPLOAD MODAL ---- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 1rem;
    display: none;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 2rem;
    width: 100%;
    max-width: 460px;
  }

  .modal-title {
    font-family: var(--serif);
    font-size: 1.4rem;
    margin-bottom: 1.5rem;
    font-weight: 400;
  }

  .drop-area {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 2.5rem 1.5rem;
    text-align: center;
    cursor: pointer;
    position: relative;
    transition: all 0.15s;
    background: var(--bg3);
    margin-bottom: 1rem;
  }

  .drop-area.drag-over { border-color: var(--accent2); }
  .drop-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .drop-area p { font-size: 13px; color: var(--text2); }
  .drop-area span { font-size: 11px; font-family: var(--mono); color: var(--text3); display: block; margin-top: 4px; }

  .upload-list {
    max-height: 160px;
    overflow-y: auto;
    margin-bottom: 1rem;
  }

  .upload-item {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text2);
    padding: 5px 0;
    border-bottom: 0.5px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .upload-item span { color: var(--text3); font-size: 11px; }

  .modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn-secondary {
    background: none;
    border: 0.5px solid var(--border2);
    color: var(--text2);
    border-radius: var(--radius);
    padding: 9px 16px;
    font-size: 13px;
    font-family: var(--sans);
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn-secondary:hover { border-color: var(--border2); color: var(--text); }

  /* ---- ESTADOS ---- */
  .empty-state {
    grid-column: 1 / -1;
    padding: 4rem 2rem;
    text-align: center;
    color: var(--text3);
  }

  .empty-state p { font-size: 13px; margin-top: 8px; }

  .empty-icon {
    font-family: var(--serif);
    font-size: 3rem;
    font-style: italic;
    color: var(--border2);
    display: block;
    margin-bottom: 8px;
  }

  .loading-text {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text3);
    text-align: center;
    padding: 3rem;
    grid-column: 1/-1;
  }

  .progress-bar {
    height: 2px;
    background: var(--border);
    border-radius: 2px;
    margin-bottom: 1rem;
    overflow: hidden;
    display: none;
  }

  .progress-bar.visible { display: block; }

  .progress-fill {
    height: 100%;
    background: var(--accent2);
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--bg2);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 10px 16px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text);
    z-index: 999;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.25s;
    pointer-events: none;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.ok { color: #70c080; border-color: rgba(80,180,100,0.25); }
  .toast.err { color: #e07060; border-color: rgba(220,80,60,0.25); }

  @media (max-width: 600px) {
    .sidebar { display: none; }
    .main { padding: 1.25rem; }
    .topbar { padding: 0 1.25rem; }
  }
</style>
</head>
<body>

<!-- ======================== PANTALLA AUTH ======================== -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Fontfolio</div>
    <div class="auth-sub">catálogo tipográfico compartido</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Crear cuenta</button>
    </div>

    <!-- Login -->
    <div id="formLogin">
      <div class="field">
        <label>Correo</label>
        <input type="email" id="loginEmail" placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="btnLogin" onclick="doLogin()">Entrar</button>
      <div class="auth-msg" id="loginMsg"></div>
    </div>

    <!-- Register -->
    <div id="formRegister" style="display:none">
      <div class="field">
        <label>Nombre de usuario</label>
        <input type="text" id="regName" placeholder="p.ej. ruben_design" />
      </div>
      <div class="field">
        <label>Correo</label>
        <input type="email" id="regEmail" placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="regPass" placeholder="mínimo 6 caracteres" />
      </div>
      <button class="btn-primary" id="btnRegister" onclick="doRegister()">Crear cuenta</button>
      <div class="auth-msg" id="registerMsg"></div>
    </div>
  </div>
</div>

<!-- ======================== APP ======================== -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-logo">Fontfolio</div>
    <div class="topbar-right">
      <span class="user-pill" id="userPill">—</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="layout">
    <!-- Sidebar: lista de usuarios -->
    <div class="sidebar">
      <div class="sidebar-label">Colecciones</div>
      <div id="userList"></div>
    </div>

    <!-- Contenido principal -->
    <div class="main">
      <div class="main-header">
        <div>
          <div class="main-title" id="mainTitle">Mi colección</div>
          <div class="main-meta" id="mainMeta">0 fuentes</div>
        </div>
        <button class="btn-upload" id="btnUploadOpen" onclick="openModal()" style="display:none">
          + Subir fuentes
        </button>
      </div>

      <!-- Controles -->
      <div class="catalog-controls">
        <input type="text" id="previewInput" value="Aa Bb Cc — tipografía" placeholder="Texto de muestra..." oninput="updatePreviews()" />
        <div class="size-wrap">
          Tamaño
          <input type="range" id="sizeSlider" min="18" max="80" value="36" step="1" oninput="updateSize(this.value)" />
          <span id="sizeLabel" style="min-width:30px">36px</span>
        </div>
        <input type="text" id="searchInput" placeholder="Buscar..." style="flex:0;width:130px" oninput="filterFonts()" />
      </div>

      <!-- Grid -->
      <div class="fonts-grid" id="fontsGrid">
        <div class="loading-text">cargando...</div>
      </div>
    </div>
  </div>
</div>

<!-- ======================== MODAL SUBIDA ======================== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Subir fuentes</div>

    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" accept=".ttf,.otf,.woff,.woff2" multiple />
      <p>Arrastra tus archivos aquí</p>
      <span>.ttf · .otf · .woff · .woff2</span>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="upload-list" id="uploadList"></div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" style="width:auto;padding:9px 20px" id="btnUpload" onclick="uploadFonts()">Subir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN — reemplaza con tus datos de Supabase
// ============================================================
const SUPABASE_URL = 'https://vejkglyblytokhzafswq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlamtnbHlibHl0b2toemFmc3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTM1NjAsImV4cCI6MjA5NjI2OTU2MH0.yNQCXKScMtelZQ1Fj1g2iFZYi7Abt5BC6vfkGKj95QI';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let currentUser = null;
let currentProfile = null;
let viewingUserId = null;
let allFonts = [];
let fontFaces = {};
let filesToUpload = [];
let previewSize = 36;

// ---- INIT ----
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await enterApp(session.user);
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') await enterApp(session.user);
    if (event === 'SIGNED_OUT') showAuth();
  });
})();

// ---- AUTH ----
function switchTab(tab) {
  document.getElementById('formLogin').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('formRegister').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');
  const msg = document.getElementById('loginMsg');
  if (!email || !pass) return showMsg(msg, 'Completa todos los campos', 'error');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) showMsg(msg, error.message, 'error');
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const btn = document.getElementById('btnRegister');
  const msg = document.getElementById('registerMsg');
  if (!name || !email || !pass) return showMsg(msg, 'Completa todos los campos', 'error');
  if (pass.length < 6) return showMsg(msg, 'La contraseña debe tener al menos 6 caracteres', 'error');
  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  const { data, error } = await sb.auth.signUp({ email, password: pass });
  if (error) { btn.disabled = false; btn.textContent = 'Crear cuenta'; return showMsg(msg, error.message, 'error'); }
  if (data.user) {
    await sb.from('profiles').insert({ id: data.user.id, username: name, email });
  }
  btn.disabled = false; btn.textContent = 'Crear cuenta';
  showMsg(msg, '¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
}

async function doLogout() {
  await sb.auth.signOut();
}

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  currentUser = null; currentProfile = null;
}

// ---- APP ----
async function enterApp(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  currentProfile = profile;
  document.getElementById('userPill').textContent = profile?.username || user.email;

  await loadUserList();
  await loadFonts(user.id);
}

async function loadUserList() {
  const { data: profiles } = await sb.from('profiles').select('id, username').order('username');
  const list = document.getElementById('userList');
  list.innerHTML = '';
  if (!profiles) return;
  profiles.forEach(p => {
    const div = document.createElement('div');
    div.className = 'user-item' + (p.id === currentUser.id ? ' active' : '');
    div.innerHTML = `<div class="user-avatar">${(p.username || 'U').slice(0,2).toUpperCase()}</div>${p.username || 'Usuario'}`;
    div.onclick = () => {
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      loadFonts(p.id, p.username);
    };
    list.appendChild(div);
  });
}

async function loadFonts(userId, username) {
  viewingUserId = userId;
  const isOwn = userId === currentUser?.id;
  const title = isOwn ? 'Mi colección' : `Colección de ${username}`;
  document.getElementById('mainTitle').textContent = title;
  document.getElementById('btnUploadOpen').style.display = isOwn ? '' : 'none';
  document.getElementById('fontsGrid').innerHTML = '<div class="loading-text">cargando fuentes...</div>';

  const { data: fonts, error } = await sb.from('fonts').select('*').eq('user_id', userId).order('name');
  if (error || !fonts) { document.getElementById('fontsGrid').innerHTML = '<div class="loading-text">error cargando fuentes</div>'; return; }

  allFonts = fonts;
  document.getElementById('mainMeta').textContent = `${fonts.length} fuente${fonts.length !== 1 ? 's' : ''}`;
  await renderFonts(fonts);
}

async function renderFonts(fonts) {
  const grid = document.getElementById('fontsGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = fonts.filter(f => f.name.toLowerCase().includes(search));
  const isOwn = viewingUserId === currentUser?.id;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">Aa</span>${allFonts.length === 0 ? 'Aún no hay fuentes en esta colección' : 'Sin resultados para esa búsqueda'}</div>`;
    return;
  }

  for (const font of filtered) {
    if (!fontFaces[font.id]) {
      const { data } = sb.storage.from('fonts').getPublicUrl(`${f.user_id}/${f.file_path}`);
      if (data?.publicUrl) {
        try {
          const ff = new FontFace(`ff_${font.id}`, `url(${data.publicUrl})`);
          const loaded = await ff.load();
          document.fonts.add(loaded);
          fontFaces[font.id] = `ff_${font.id}`;
        } catch(e) { fontFaces[font.id] = 'inherit'; }
      }
    }
  }

  const preview = document.getElementById('previewInput').value || 'Aa Bb Cc';

  grid.innerHTML = filtered.map(f => {
    const family = fontFaces[f.id] || 'inherit';
    const { data } = sb.storage.from('fonts').getPublicUrl(`${f.user_id}/${f.file_path}`);
    const url = data?.publicUrl || '#';
    return `<div class="font-card">
      <div class="font-card-top">
        <span class="font-card-name">${f.name}</span>
        <div class="card-actions">
          <a class="btn-card" href="${url}" download="${f.name}" target="_blank">↓ descargar</a>
          ${isOwn ? `<button class="btn-card danger" onclick="deleteFont('${f.id}','${f.file_path}')">✕</button>` : ''}
        </div>
      </div>
      <div class="font-preview-text" style="font-family:'${family}';font-size:${previewSize}px" id="prev_${f.id}">${preview}</div>
      <div class="font-divider"></div>
      <div class="font-alphabet" style="font-family:'${family}'">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 0123456789</div>
    </div>`;
  }).join('');
}

function updatePreviews() {
  const text = document.getElementById('previewInput').value || 'Aa Bb Cc';
  document.querySelectorAll('.font-preview-text').forEach(el => el.textContent = text);
}

function updateSize(val) {
  previewSize = parseInt(val);
  document.getElementById('sizeLabel').textContent = val + 'px';
  document.querySelectorAll('.font-preview-text').forEach(el => el.style.fontSize = val + 'px');
}

function filterFonts() { renderFonts(allFonts); }

// ---- UPLOAD ----
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  filesToUpload = [];
  document.getElementById('uploadList').innerHTML = '';
  document.getElementById('progressBar').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('fileInput').value = '';
  filesToUpload = [];
}

const dropArea = document.getElementById('dropArea');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
document.getElementById('fileInput').addEventListener('change', e => addFiles(e.target.files));

function addFiles(fileList) {
  Array.from(fileList).forEach(file => {
    if (!file.name.match(/\.(ttf|otf|woff|woff2)$/i)) return;
    if (filesToUpload.find(f => f.name === file.name)) return;
    filesToUpload.push(file);
  });
  const list = document.getElementById('uploadList');
  list.innerHTML = filesToUpload.map(f =>
    `<div class="upload-item">${f.name} <span>${(f.size/1024).toFixed(0)} KB</span></div>`
  ).join('');
}

async function uploadFonts() {
  if (!filesToUpload.length) return;
  const btn = document.getElementById('btnUpload');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  btn.disabled = true; btn.textContent = 'Subiendo...';
  bar.classList.add('visible');

  let done = 0;
  for (const file of filesToUpload) {
    const path = `${currentUser.id}/${Date.now()}_${file.name}`;
    const { error: storErr } = await sb.storage.from('fonts').upload(path, file, { upsert: false });
    if (!storErr) {
      await sb.from('fonts').insert({
        user_id: currentUser.id,
        name: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
        file_path: path.split('/').slice(1).join('/'),
        file_name: file.name,
        file_size: file.size
      });
    }
    done++;
    fill.style.width = Math.round((done / filesToUpload.length) * 100) + '%';
  }

  btn.disabled = false; btn.textContent = 'Subir';
  closeModal();
  showToast(`${done} fuente${done !== 1 ? 's' : ''} subida${done !== 1 ? 's' : ''} ✓`, 'ok');
  await loadFonts(currentUser.id);
}

async function deleteFont(fontId, filePath) {
  if (!confirm('¿Eliminar esta fuente de tu colección?')) return;
  await sb.storage.from('fonts').remove([`${currentUser.id}/${filePath}`]);
  await sb.from('fonts').delete().eq('id', fontId);
  showToast('Fuente eliminada', 'ok');
  delete fontFaces[fontId];
  await loadFonts(currentUser.id);
}

// ---- UTILS ----
function showMsg(el, text, type) {
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

function showToast(text, type = '') {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
