<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fontfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================== PANTALLA AUTH ======================== -->
<div id="authScreen">
  <div class="auth-box">
    <div class="auth-logo">Fontfolio</div>
    <div class="auth-sub">catálogo tipográfico compartido</div>

    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Crear cuenta</button>
    </div>

    <!-- Login -->
    <div id="formLogin">
      <div class="field">
        <label>Correo</label>
        <input type="email" id="loginEmail" placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="loginPass" placeholder="••••••••" />
      </div>
      <button class="btn-primary" id="btnLogin" onclick="doLogin()">Entrar</button>
      <div class="auth-msg" id="loginMsg"></div>
    </div>

    <!-- Register -->
    <div id="formRegister" style="display:none">
      <div class="field">
        <label>Nombre de usuario</label>
        <input type="text" id="regName" placeholder="p.ej. ruben_design" />
      </div>
      <div class="field">
        <label>Correo</label>
        <input type="email" id="regEmail" placeholder="tu@correo.com" />
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="regPass" placeholder="mínimo 6 caracteres" />
      </div>
      <button class="btn-primary" id="btnRegister" onclick="doRegister()">Crear cuenta</button>
      <div class="auth-msg" id="registerMsg"></div>
    </div>
  </div>
</div>

<!-- ======================== APP ======================== -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-logo">Fontfolio</div>
    <nav class="nav-menu">
      <a class="nav-link" data-route="catalogo" onclick="navigate('catalogo')">Catálogo</a>
      <a class="nav-link" data-route="perfil" onclick="navigate('perfil')">Perfil</a>
    </nav>
    <div class="topbar-right">
      <span class="user-pill" id="userPill">—</span>
      <button class="btn-logout" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="layout" id="catalogoPage">
    <!-- Sidebar: lista de usuarios -->
    <div class="sidebar">
      <div class="sidebar-label">Colecciones</div>
      <div id="userList"></div>
    </div>

    <!-- Contenido principal -->
    <div class="main">
      <div class="main-header">
        <div>
          <div class="main-title" id="mainTitle">Mi colección</div>
          <div class="main-meta" id="mainMeta">0 fuentes</div>
        </div>
        <button class="btn-upload" id="btnUploadOpen" onclick="openModal()" style="display:none">
          + Subir fuentes
        </button>
      </div>

      <!-- Controles -->
      <div class="catalog-controls">
        <input type="text" id="previewInput" value="Aa Bb Cc — tipografía" placeholder="Texto de muestra..." oninput="updatePreviews()" />
        <div class="size-wrap">
          Tamaño
          <input type="range" id="sizeSlider" min="18" max="80" value="36" step="1" oninput="updateSize(this.value)" />
          <span id="sizeLabel" style="min-width:30px">36px</span>
        </div>
        <input type="text" id="searchInput" placeholder="Buscar..." style="flex:0;width:130px" oninput="filterFonts()" />
      </div>

      <!-- Grid -->
      <div class="fonts-grid" id="fontsGrid">
        <div class="loading-text">cargando...</div>
      </div>
    </div>
  </div>

  <!-- ======================== PAGINA PERFIL ======================== -->
  <div class="profile-page" id="perfilPage" style="display:none">
    <div class="profile-card">
      <div class="profile-avatar-lg" id="profileAvatar">U</div>
      <div class="main-title" id="profileUsername" style="font-size:1.4rem">—</div>
      <div class="main-meta" id="profileEmail">—</div>

      <div class="profile-stats">
        <div>
          <div class="profile-stat-num" id="profileFontCount">0</div>
          <div class="profile-stat-label">Fuentes</div>
        </div>
      </div>

      <div class="field">
        <label>Nombre de usuario</label>
        <input type="text" id="profileNameInput" />
      </div>
      <button class="btn-primary" onclick="updateUsername()">Guardar cambios</button>
      <div class="auth-msg" id="profileMsg"></div>
    </div>
  </div>
</div>

<!-- ======================== MODAL SUBIDA ======================== -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">Subir fuentes</div>

    <div class="drop-area" id="dropArea">
      <input type="file" id="fileInput" accept=".ttf,.otf,.woff,.woff2" multiple />
      <p>Arrastra tus archivos aquí</p>
      <span>.ttf · .otf · .woff · .woff2</span>
    </div>

    <div class="progress-bar" id="progressBar">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="upload-list" id="uploadList"></div>

    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn-primary" style="width:auto;padding:9px 20px" id="btnUpload" onclick="uploadFonts()">Subir</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// CONFIGURACIÓN — reemplaza con tus datos de Supabase
// ============================================================
const SUPABASE_URL = 'https://vejkglyblytokhzafswq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlamtnbHlibHl0b2toemFmc3dxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2OTM1NjAsImV4cCI6MjA5NjI2OTU2MH0.yNQCXKScMtelZQ1Fj1g2iFZYi7Abt5BC6vfkGKj95QI';
// ============================================================

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ============================================================
// SERVICIOS — encapsulan el acceso a Supabase.
// Equivalente a un @Injectable() de Angular: cada clase recibe
// el cliente de Supabase por constructor (inyección manual) y
// expone métodos en vez de exponer el cliente directamente.
// ============================================================

class AuthService {
  constructor(client) { this.client = client; }
  getSession() { return this.client.auth.getSession(); }
  onAuthStateChange(callback) { return this.client.auth.onAuthStateChange(callback); }
  signIn(email, password) { return this.client.auth.signInWithPassword({ email, password }); }
  signUp(email, password) { return this.client.auth.signUp({ email, password }); }
  signOut() { return this.client.auth.signOut(); }
}

class ProfileService {
  constructor(client) { this.client = client; }
  getProfile(userId) { return this.client.from('profiles').select('*').eq('id', userId).single(); }
  listProfiles() { return this.client.from('profiles').select('id, username').order('username'); }
  createProfile(profile) { return this.client.from('profiles').insert(profile); }
  updateUsername(userId, username) { return this.client.from('profiles').update({ username }).eq('id', userId); }
}

class FontService {
  constructor(client) { this.client = client; }
  getFontsByUser(userId) { return this.client.from('fonts').select('*').eq('user_id', userId).order('name'); }
  getPublicUrl(userId, filePath) { return this.client.storage.from('fonts').getPublicUrl(`${userId}/${filePath}`); }
  uploadFile(path, file) { return this.client.storage.from('fonts').upload(path, file, { upsert: false }); }
  insertFontRecord(record) { return this.client.from('fonts').insert(record); }
  deleteFile(path) { return this.client.storage.from('fonts').remove([path]); }
  deleteRecord(fontId) { return this.client.from('fonts').delete().eq('id', fontId); }
}

// Instancias "inyectadas": cada servicio recibe el cliente de Supabase.
const authService = new AuthService(sb);
const profileService = new ProfileService(sb);
const fontService = new FontService(sb);

let currentUser = null;
let currentProfile = null;
let viewingUserId = null;
let allFonts = [];
let fontFaces = {};
let filesToUpload = [];
let previewSize = 36;

// ---- INIT ----
(async () => {
  const { data: { session } } = await authService.getSession();
  if (session) await enterApp(session.user);
  authService.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN') await enterApp(session.user);
    if (event === 'SIGNED_OUT') showAuth();
  });
  window.addEventListener('hashchange', router);
})();

// ---- ROUTER ----
function navigate(route) {
  location.hash = route;
}

function router() {
  const route = location.hash.replace('#', '') || 'catalogo';

  document.getElementById('catalogoPage').style.display = route === 'perfil' ? 'none' : 'flex';
  document.getElementById('perfilPage').style.display = route === 'perfil' ? 'block' : 'none';

  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.dataset.route === route);
  });

  if (route === 'perfil') renderProfile();
}

function renderProfile() {
  if (!currentUser) return;
  const username = currentProfile?.username || 'Usuario';
  document.getElementById('profileAvatar').textContent = username.slice(0, 2).toUpperCase();
  document.getElementById('profileUsername').textContent = username;
  document.getElementById('profileEmail').textContent = currentUser.email;
  document.getElementById('profileFontCount').textContent = allFonts.length;
  document.getElementById('profileNameInput').value = username;
}

async function updateUsername() {
  const newName = document.getElementById('profileNameInput').value.trim();
  const msg = document.getElementById('profileMsg');
  if (!newName) return showMsg(msg, 'El nombre no puede estar vacío', 'error');
  const { error } = await profileService.updateUsername(currentUser.id, newName);
  if (error) return showMsg(msg, error.message, 'error');
  currentProfile.username = newName;
  document.getElementById('userPill').textContent = newName;
  showMsg(msg, 'Nombre actualizado ✓', 'success');
  renderProfile();
}

// ---- AUTH ----
function switchTab(tab) {
  document.getElementById('formLogin').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('formRegister').style.display = tab === 'register' ? '' : 'none';
  document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
  document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  const btn = document.getElementById('btnLogin');
  const msg = document.getElementById('loginMsg');
  if (!email || !pass) return showMsg(msg, 'Completa todos los campos', 'error');
  btn.disabled = true; btn.textContent = 'Entrando...';
  const { error } = await authService.signIn(email, pass);
  btn.disabled = false; btn.textContent = 'Entrar';
  if (error) showMsg(msg, error.message, 'error');
}

async function doRegister() {
  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  const btn = document.getElementById('btnRegister');
  const msg = document.getElementById('registerMsg');
  if (!name || !email || !pass) return showMsg(msg, 'Completa todos los campos', 'error');
  if (pass.length < 6) return showMsg(msg, 'La contraseña debe tener al menos 6 caracteres', 'error');
  btn.disabled = true; btn.textContent = 'Creando cuenta...';
  const { data, error } = await authService.signUp(email, pass);
  if (error) { btn.disabled = false; btn.textContent = 'Crear cuenta'; return showMsg(msg, error.message, 'error'); }
  if (data.user) {
    await profileService.createProfile({ id: data.user.id, username: name, email });
  }
  btn.disabled = false; btn.textContent = 'Crear cuenta';
  showMsg(msg, '¡Cuenta creada! Revisa tu correo para confirmar.', 'success');
}

async function doLogout() {
  await authService.signOut();
}

function showAuth() {
  document.getElementById('authScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  currentUser = null; currentProfile = null;
}

// ---- APP ----
async function enterApp(user) {
  currentUser = user;
  document.getElementById('authScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';

  const { data: profile } = await profileService.getProfile(user.id);
  currentProfile = profile;
  document.getElementById('userPill').textContent = profile?.username || user.email;

  await loadUserList();
  await loadFonts(user.id);
  router();
}

async function loadUserList() {
  const { data: profiles } = await profileService.listProfiles();
  const list = document.getElementById('userList');
  list.innerHTML = '';
  if (!profiles) return;
  profiles.forEach(p => {
    const div = document.createElement('div');
    div.className = 'user-item' + (p.id === currentUser.id ? ' active' : '');
    div.innerHTML = `<div class="user-avatar">${(p.username || 'U').slice(0,2).toUpperCase()}</div>${p.username || 'Usuario'}`;
    div.onclick = () => {
      document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
      div.classList.add('active');
      loadFonts(p.id, p.username);
    };
    list.appendChild(div);
  });
}

async function loadFonts(userId, username) {
  viewingUserId = userId;
  const isOwn = userId === currentUser?.id;
  const title = isOwn ? 'Mi colección' : `Colección de ${username}`;
  document.getElementById('mainTitle').textContent = title;
  document.getElementById('btnUploadOpen').style.display = isOwn ? '' : 'none';
  document.getElementById('fontsGrid').innerHTML = '<div class="loading-text">cargando fuentes...</div>';

  const { data: fonts, error } = await fontService.getFontsByUser(userId);
  if (error || !fonts) { document.getElementById('fontsGrid').innerHTML = '<div class="loading-text">error cargando fuentes</div>'; return; }

  allFonts = fonts;
  document.getElementById('mainMeta').textContent = `${fonts.length} fuente${fonts.length !== 1 ? 's' : ''}`;
  await renderFonts(fonts);
  if ((location.hash.replace('#','') || 'catalogo') === 'perfil') renderProfile();
}

async function renderFonts(fonts) {
  const grid = document.getElementById('fontsGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();
  const filtered = fonts.filter(f => f.name.toLowerCase().includes(search));
  const isOwn = viewingUserId === currentUser?.id;

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty-state"><span class="empty-icon">Aa</span>${allFonts.length === 0 ? 'Aún no hay fuentes en esta colección' : 'Sin resultados para esa búsqueda'}</div>`;
    return;
  }

  for (const font of filtered) {
    if (!fontFaces[font.id]) {
      const { data } = fontService.getPublicUrl(font.user_id, font.file_path);
      if (data?.publicUrl) {
        try {
          const ff = new FontFace(`ff_${font.id}`, `url(${data.publicUrl})`);
          const loaded = await ff.load();
          document.fonts.add(loaded);
          fontFaces[font.id] = `ff_${font.id}`;
        } catch(e) { fontFaces[font.id] = 'inherit'; }
      }
    }
  }

  const preview = document.getElementById('previewInput').value || 'Aa Bb Cc';

  grid.innerHTML = filtered.map(f => {
    const family = fontFaces[f.id] || 'inherit';
    const { data } = fontService.getPublicUrl(f.user_id, f.file_path);
    const url = data?.publicUrl || '#';
    return `<div class="font-card">
      <div class="font-card-top">
        <span class="font-card-name">${f.name}</span>
        <div class="card-actions">
          <a class="btn-card" href="${url}" download="${f.name}" target="_blank">↓ descargar</a>
          ${isOwn ? `<button class="btn-card danger" onclick="deleteFont('${f.id}','${f.file_path}')">✕</button>` : ''}
        </div>
      </div>
      <div class="font-preview-text" style="font-family:'${family}';font-size:${previewSize}px" id="prev_${f.id}">${preview}</div>
      <div class="font-divider"></div>
      <div class="font-alphabet" style="font-family:'${family}'">ABCDEFGHIJKLMNOPQRSTUVWXYZ abcdefghijklmnopqrstuvwxyz 0123456789</div>
    </div>`;
  }).join('');
}

function updatePreviews() {
  const text = document.getElementById('previewInput').value || 'Aa Bb Cc';
  document.querySelectorAll('.font-preview-text').forEach(el => el.textContent = text);
}

function updateSize(val) {
  previewSize = parseInt(val);
  document.getElementById('sizeLabel').textContent = val + 'px';
  document.querySelectorAll('.font-preview-text').forEach(el => el.style.fontSize = val + 'px');
}

function filterFonts() { renderFonts(allFonts); }

// ---- UPLOAD ----
function openModal() {
  document.getElementById('modalOverlay').classList.add('open');
  filesToUpload = [];
  document.getElementById('uploadList').innerHTML = '';
  document.getElementById('progressBar').classList.remove('visible');
  document.getElementById('progressFill').style.width = '0%';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.getElementById('fileInput').value = '';
  filesToUpload = [];
}

const dropArea = document.getElementById('dropArea');
dropArea.addEventListener('dragover', e => { e.preventDefault(); dropArea.classList.add('drag-over'); });
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('drag-over'));
dropArea.addEventListener('drop', e => { e.preventDefault(); dropArea.classList.remove('drag-over'); addFiles(e.dataTransfer.files); });
document.getElementById('fileInput').addEventListener('change', e => addFiles(e.target.files));

function addFiles(fileList) {
  Array.from(fileList).forEach(file => {
    if (!file.name.match(/\.(ttf|otf|woff|woff2)$/i)) return;
    if (filesToUpload.find(f => f.name === file.name)) return;
    filesToUpload.push(file);
  });
  const list = document.getElementById('uploadList');
  list.innerHTML = filesToUpload.map(f =>
    `<div class="upload-item">${f.name} <span>${(f.size/1024).toFixed(0)} KB</span></div>`
  ).join('');
}

async function uploadFonts() {
  if (!filesToUpload.length) return;
  const btn = document.getElementById('btnUpload');
  const bar = document.getElementById('progressBar');
  const fill = document.getElementById('progressFill');
  btn.disabled = true; btn.textContent = 'Subiendo...';
  bar.classList.add('visible');

  let done = 0;
  for (const file of filesToUpload) {
    const path = `${currentUser.id}/${Date.now()}_${file.name}`;
    const { error: storErr } = await fontService.uploadFile(path, file);
    if (!storErr) {
      await fontService.insertFontRecord({
        user_id: currentUser.id,
        name: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' '),
        file_path: path.split('/').slice(1).join('/'),
        file_name: file.name,
        file_size: file.size
      });
    }
    done++;
    fill.style.width = Math.round((done / filesToUpload.length) * 100) + '%';
  }

  btn.disabled = false; btn.textContent = 'Subir';
  closeModal();
  showToast(`${done} fuente${done !== 1 ? 's' : ''} subida${done !== 1 ? 's' : ''} ✓`, 'ok');
  await loadFonts(currentUser.id);
}

async function deleteFont(fontId, filePath) {
  if (!confirm('¿Eliminar esta fuente de tu colección?')) return;
  await fontService.deleteFile(`${currentUser.id}/${filePath}`);
  await fontService.deleteRecord(fontId);
  showToast('Fuente eliminada', 'ok');
  delete fontFaces[fontId];
  await loadFonts(currentUser.id);
}

// ---- UTILS ----
function showMsg(el, text, type) {
  el.textContent = text;
  el.className = 'auth-msg ' + type;
}

function showToast(text, type = '') {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
</body>
</html>
